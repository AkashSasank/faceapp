# Contains configs for all projects that uses chroma db
foo:
  project_id: "hgjg3366645j12gj"
  files:
    input_path: ["./dataset/raw"]
    output_path: ["./dataset/processed"]
    failed_path: ["./dataset/retry"]
  extraction:
    features:  ["age", "gender", "race", "emotion"]
    embedding_models: ["Facenet512",]
    similarity_thresholds: [.4]
    weightage: [1]
  index_config:
    DeepID:
      hnsw:
        space: "cosine"
        ef_construction: 500
        ef_search: 500
        max_neighbors: 128
    VGG-Face:
      hnsw:
        space: "cosine"
        ef_construction: 500
        ef_search: 500
        max_neighbors: 128
    Facenet512:
      hnsw:
        space: "cosine"
        ef_construction: 500
        ef_search: 500
        max_neighbors: 128

  qdrant_index_config:
    defaults:
      distance: "cosine"
      hnsw:
        m: 64
        ef_construct: 800
        full_scan_threshold: 20000
      search:
        hnsw_ef: 1024
        exact: false
    DeepID:
      distance: "cosine"
      hnsw:
        m: 64
        ef_construct: 800
      search:
        hnsw_ef: 1024
        exact: false
    VGG-Face:
      distance: "cosine"
      hnsw:
        m: 64
        ef_construct: 800
      search:
        hnsw_ef: 1024
        exact: false
    Facenet512:
      distance: "cosine"
      hnsw:
        m: 64
        ef_construct: 800
      search:
        hnsw_ef: 1024
        exact: false

  dotenv_path:

