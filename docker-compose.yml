services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/snapshots
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local
